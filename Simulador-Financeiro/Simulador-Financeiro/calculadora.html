<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Calculadora Financeira - Câmara Fria</title>
    <link rel="stylesheet" href="style.css"/>
</head>



<body>

  <header class="cabecalho">

  <div class="logo2">
    <img src="logo2.png">
</div>

  <div class="menu">                                                                                
     <ul>
            <li><a href="../../Site-Institucional/site.html">Home  </a></li>
   <li><a href="calculadora.html">Simulação </a></li>
    <li><a href="../../Site-Institucional/Login e cadastro/login.html">Login </a></li>

   </ul> 
   
  </div>
</header>


    <h1><br>Calculadora Financeira</h1>

    <div id="formulario">

        <p>Quantidade de carcaças armazenadas:</p>
        <input type="text" id="input_qtd">

        <p>Peso médio por carcaça (kg):</p>
        <input type="text" id="input_peso">

        <p>Preço médio por kg (R$):</p>
        <input type="text" id="input_preco">

        <p>Porcentagem de perda por temperatura(%):</p>
        <input type="text" id="input_porcentagem">

    </div>

    <br><br>

    <button id="btn_calcular" onclick="calculo()">Calcular</button>

    <div id="mensagem"></div>

</body>

</html>

<script>
function calculo() {

    let qtdCarcaca = Number(input_qtd.value);
    let peso = Number(input_peso.value);
    let precoKg = Number(input_preco.value.replace(',', '.'));
    let percentualPerda = Number(input_porcentagem.value)

    if(
        isNaN(qtdCarcaca) || qtdCarcaca <= 0 || 
        isNaN(peso) || peso <= 0 ||
        isNaN(precoKg) || precoKg <= 0 || 
        isNaN(percentualPerda) || percentualPerda <= 0 
    ) {
        alert('Digite valores validos')
        input_qtd.value = ''
        input_peso.value = ''
        input_preco.value = ''
        mensagem.innerHTML = ''
        return
    }

    let perdaPercentual = percentualPerda / 100 
    let reducaoSistema = 1;

    let totalKg = qtdCarcaca * peso;
    let valorTotal = totalKg * precoKg;

    let perdaKg = totalKg * perdaPercentual;
    let prejuizoMensal = perdaKg * precoKg;

    let perdaEvitadaKg = perdaKg * reducaoSistema;
    let economiaMensal = perdaEvitadaKg * precoKg;

    let economiaAnual = economiaMensal * 12

    let precoKgMoeda = precoKg.toLocaleString('pt-BR', {style: "currency", currency: 'BRL'});
    let prejuizoMensalMoeda = prejuizoMensal.toLocaleString('pt-BR', {style: "currency", currency: 'BRL'});
    let economiaMensalMoeda = economiaMensal.toLocaleString('pt-BR', {style: "currency", currency: 'BRL'});
    let economiaAnualMoeda = economiaAnual.toLocaleString('pt-BR', {style: "currency", currency: 'BRL'});

    
   mensagem.innerHTML = `
    
<p class="texto">
<b class="prejuizo">Sem o sistema de monitoramento:</b><br><br>

Considerando ${qtdCarcaca} carcaças armazenadas,
com peso médio de ${peso}kg e preço de ${precoKgMoeda}/kg,
o açougue possui aproximadamente <b>${totalKg} kg</b> de carne armazenada.<br><br>

Em situações inadequadas, a perda pode chegar a
<span class="prejuizo">${percentualPerda}%</span>,
resultando no desperdício de
<span class="prejuizo">${perdaKg.toFixed(2)} kg</span>.<br><br>

Isso representa um prejuízo mensal de
<span class="prejuizo">${prejuizoMensalMoeda}</span>.
</p>

<br>

<p class="texto">
<b class="lucro">Com o nosso sistema de monitoramento:</b><br><br>

O controle de temperatura e alertas em tempo real pode evitar até 80% dessas perdas,
preservando cerca de
<span class="lucro">${perdaEvitadaKg.toFixed(2)} kg</span> de carne por mês.<br><br>

Isso gera uma economia mensal de
<span class="lucro">${economiaMensalMoeda}</span>.<br><br>

Em um ano, o açougue deixaria de perder cerca de
<span class="lucro">${economiaAnualMoeda}</span>.
</p>

<br><br>
<button onclick="voltar()">Voltar</button>
`;

    // esconder inputs e botão
    formulario.style.display = "none";
    btn_calcular.style.display = "none";
}

function voltar() {
    formulario.style.display = "block";
    btn_calcular.style.display = "inline-block";
    mensagem.innerHTML = '';
}
</script>
