<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style-login.css">
    <title>meatech</title>
</head>

<body>

    <header class="cabecalho">

        <div class="logo2">
            <img src="./img/logo2.png" alt="Logo2">
        </div>

        <nav class="menu">

            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Simulação</a></li>
                <li><a href="#" class="btn-destaque">Login</a></li>
            </ul>

        </nav>
    </header>

    <div class="login">

        <div class="coluna_esquerda">
            <h2>Faça o seu login!</h2>

            <div class="cadastro_empresa_link">
                <p>A sua empresa ainda não tem conta? <a href="#">Cadastre sua empresa</a></p>
            </div>

        <div class="campo">
            <h6>Digite o e-mail ou CNPJ</h6>
            <input type="text" id="input_validacao">
        </div>

        <div class="campo">
            <h6>Digite a sua senha</h6>
            <input type="password" id="input_criacaoSenha" placeholder="Mínimo de 8 caracteres">
            <small style="color: #f3f2f2;">*Deve conter pelo menos 1 letra maiúscula e
                minúscula, 1 caractere especial e 1 número</small>
        </div>


        <div class="loginbutton">
            <button onclick="login()">Cadastrar</button>
        </div>
    </div>


    <div class="coluna_direita">
        <div class="logo1">
            <img src="img/logo1.png" alt="Logo1">
        </div>
    </div>

    </div>
    </div>
</body>

</html>
