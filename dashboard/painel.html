<!DOCTYPE html>

<head>

        rel="stylesheet">

<body>
    <div class="container">

        <div class="menu">

                <img src="./image/logo.png" alt="logo da empresa">

            <div class="nav-bar">

                <a href="#" class="nav-item">

            <button><a href="../Site-Institucional/site.html">Sair</a></button>

            <div class="box">

                <div class="box-info">
                    <div class="kpi-box">
                        <div class="h5-img">

                            <img src="./image/taxa.png">

                        <span class="verde">0°C a 4°C</span>

                <div class="grafico">
                    <h3>Temperatura das Câmaras Frias</h3>

                        <canvas id="tempAtual"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<script>


    const data2 = {
        labels: ['Câmara 1', 'Câmara 2', 'Câmara 3', 'Câmara 4', 'Câmara 5', 'Câmara 6', 'Câmara 7', 'Câmara 8', 'Câmara 9', 'Câmara 10', 'Câmara 11', 'Câmara 12', 'Câmara 13'],
        datasets: [{
            label: 'Temperatura',
            data: [-2, 3, 1, 0, 7, 3, 4, 2, 3.4, 6, 2.9, 3.7, 2.5],
            backgroundColor:[
            '#8B0000',
            '#006400',
            '#006400',
            '#006400',
            '#8B0000',
            '#006400',
            '#006400',
            '#006400',
            '#006400',
            '#8B0000',
            '#006400',
            '#006400',
            '#006400'],
            borderColor: '#000000',
            tension: 0.3,
            fill: false,
            pointRadius: 4,
            pointHoverRadius: 5
        }]
    };

    const config2 = {
        type: 'bar',
        data: data2,
        options: {
            responsive: true,
            maintainAspectRatio: false,

            plugins: {
                legend: {
                    display: false
                },

            },

            scales: {
                y: {
                    min: -4,
                    max: 8,
                    ticks: {
                        callback: function (value) {
                            return value + '°C';
                        },
                        stepSize: 2
                    }
                }
            }
        }
    };
</script>

<script>

    let graficoBarras = new Chart(
        document.getElementById('tempAtual'),
        config2
    );

    var paginacao = {};
    var tempo = {};

    function obterDados(grafico, endpoint) {
        fetch('http://localhost:3300/sensores/' + endpoint)
            .then(response => response.json())
            .then(valores => {
                if (paginacao[endpoint] == null) {
                    paginacao[endpoint] = 0;
                }
                if (tempo[endpoint] == null) {
                    tempo[endpoint] = 0;
                }

                var ultimaPaginacao = paginacao[endpoint];
                paginacao[endpoint] = valores.length;
                valores = valores.slice(ultimaPaginacao);

                valores.forEach((valor) => {
                    grafico.data.datasets[0].data[12] = valor;
                    grafico.update();
                });
            })
            .catch(error => console.error('Erro ao obter dados:', error));
    }

    setInterval(() => {
        obterDados(graficoBarras, 'analogico');
    }, 1000);

</script>
